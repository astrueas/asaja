<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> yusuf jeyek 💙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Tampilan Utama Wadah (Card) */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 10;
            max-width: 100%;
            width: 400px;
            transition: all 0.5s ease-in-out;
        }

        /* Sistem Halaman (Sembunyikan Halaman 2 di Awal) */
        .page {
            display: none;
            animation: fadeIn 0.8s ease-in-out forwards;
        }

        .page.active {
            display: block;
        }

        /* --- ELEMEN HALAMAN 1 --- */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #fff;
            background-color: #ddd;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* --- ELEMEN HALAMAN 2 --- */
        .gallery-frame {
            width: 100%;
            height: 180px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .gallery-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .love-letter {
            color: #f0f0f0;
            font-size: 0.95rem;
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            text-align: left;
            border-left: 4px solid #80d0ff;
        }

        /* --- TEKS & TOMBOL --- */
        h1, h2 {
            color: #ffffff;
            font-size: 1.8rem;
            margin-bottom: 12px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        p {
            color: #e0e0e0;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            gap: 12px;
        }

        .love-btn, .choice-btn {
            background: #ffffff;
            color: #1e3c72;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
        }

        .love-btn:hover, .choice-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255,255,255,0.4);
        }

        .choice-btn {
            background: #80d0ff;
            color: #1e3c72;
        }

        /* --- EFEK ANIMASI HATI --- */
        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            font-size: 24px;
            animation: fall linear infinite;
            top: -10%;
            z-index: 1;
            pointer-events: none;
        }

        .blue-heart {
            color: #80d0ff !important;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        
        <div id="page1" class="page active">
            <div class="profile-pic">👦🏻</div> 
            <h1>Hai PACARRR AKUUU!</h1>
            <p> Cuma mau bilang thank u for everything, i love u so much! 🤍</p>
            <button class="love-btn" onclick="nextPage()">coba klik sayangg! 🤍</button>
        </div>

        <div id="page2" class="page">
            <h2>beduaa 🤍</h2>
            
            <div class="gallery-frame">
                <img src="bedua.jpeg" alt="Moments">
            </div>

            <div class="love-letter">
                Makasi ya sayangg suda sabar sama akuu, i don't know why can saying that pokoknya aku sayang sekali sama pacarr akuu. 
                <br><br>
                <i>I love you more than words can say.</i> 🤍
            </div>

            <div class="btn-group">
                <button class="choice-btn" onclick="reply('love')">Love You Too! 💙</button>
                <button class="choice-btn" onclick="reply('more')">Love You More! </button>
            </div>
        </div>

    </div>

    <script>
        // 1. Efek Hati Berjatuhan secara Otomatis sejak Awal
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            const heartTypes = ['💙', '🤍', '✨'];
            heart.innerHTML = heartTypes[Math.floor(Math.random() * heartTypes.length)];
            
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 3 + "s"; 
            heart.style.fontSize = Math.random() * 15 + 12 + "px";
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }
        setInterval(createHeart, 400);

        // 2. Fungsi Berpindah Halaman + Efek Ledakan Hati Pink
        function nextPage() {
            // Efek ledakan hati pink/merah ketika tombol diklik
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart', 'blue-heart');
                    heart.innerHTML = '💖';
                    heart.style.left = Math.random() * 100 + "vw";
                    heart.style.animationDuration = Math.random() * 2 + 1 + "s";
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 3000);
                }, i * 80);
            }

            // Proses transisi perpindahan halaman
            setTimeout(() => {
                document.getElementById('page1').classList.remove('active');
                document.getElementById('page2').classList.add('active');
                // Sedikit melebarkan card agar pas dengan konten halaman kedua
                document.getElementById('main-card').style.width = '450px';
            }, 800);
        }

        // 3. Respon Tombol Pilihan di Halaman Kedua (Sudah Diperbaiki)
        function reply(type) {
            if(type === 'love') {
                alert('memang harus love me too😜');
            } else {
                alert('ndaaa, aku yang love you more more more and more ');
            }
        }
    </script>

</body>
</html>
